# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
source=~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 10
    gaps_out = 20
    no_focus_fallback = false
    border_size = 3

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color15 $color2 90deg
    col.inactive_border = $color0

    resize_on_border = true

    allow_tearing = true

    layout = dwindle
}

decoration {
    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1

    # Efecto de desenfoque tipo iOS
    blur {
        enabled = true
        size = 5
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        xray = false
    }

    # Bordes suaves y sombras sutiles
    rounding = 5
    rounding_power = 2

    shadow {
       enabled = true
       range = 30
       render_power = 2
       offset = 3 3
       color = $background
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes
    
# Curvas suaves tipo iOS
    bezier = iosEaseInOut, 0.25, 0.1, 0.25, 1
    bezier = iosSlide, 0.33, 1, 0.68, 1

    # Animación de ventanas: popin suave
    animation = windows, 1, 6, iosEaseInOut, popin 50%

    # Cambio de workspace con efecto tipo deslizamiento
    animation = workspaces, 1, 7, iosSlide, slide

    # Desvanecimiento (fade) para transiciones generales
    animation = fade, 1, 8, iosEaseInOut

    # Borde dinámico pero no exagerado
    animation = border, 1, 10, iosEaseInOut
    animation = borderangle, 1, 100, iosEaseInOut, loop

    # Minimizar/Maximizar si usas ese feature
    animation = specialWorkspace, 1, 8, iosEaseInOut, slidefade
     
    animation = layersIn, 1, 6, default, slide right
    animation = layersOut, 1, 6, default, slide right


}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this enabled, otherwise the layout will be reset to the default one when you change the number of windows in a workspace
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

scrolling {
    direction = left
    focus_fit_method = 0
}

